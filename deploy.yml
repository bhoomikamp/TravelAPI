##############################################################################
# TravelAPI – GitHub Actions CI/CD Pipeline
#
# Workflow:
#   1. On every push to main / PR:
#      - Build & test with Maven
#      - Run unit tests
#   2. On push to main only:
#      - Build Docker image
#      - Push to Google Container Registry
#      - Deploy to GCP Cloud Run
##############################################################################

name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  SERVICE_NAME: travelapi
  REGION: asia-south1
  IMAGE: gcr.io/${{ secrets.GCP_PROJECT_ID }}/travelapi

jobs:

  # ── Build & Test ────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: mvn --batch-mode test
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Build JAR (skip tests — already run above)
        run: mvn --batch-mode package -DskipTests

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: travelapi-jar
          path: target/travelapi-*.jar
          retention-days: 7

  # ── Deploy to Cloud Run ─────────────────────────────────────────────────────
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      id-token: write   # Required for Workload Identity Federation

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: travelapi-jar
          path: target/

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      - name: Build Docker image
        run: |
          docker build \
            --tag ${{ env.IMAGE }}:${{ github.sha }} \
            --tag ${{ env.IMAGE }}:latest \
            .

      - name: Push Docker image to GCR
        run: |
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --quiet

      - name: Print Cloud Run URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --format 'value(status.url)')
          echo "✅ Deployed to: $URL"
          echo "CLOUD_RUN_URL=$URL" >> $GITHUB_STEP_SUMMARY
